services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: cf-cookie-flaresolverr
    restart: unless-stopped
    ports:
      - "8191:8191"
    environment:
      LOG_LEVEL: info

  cf-cookie-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cf-cookie-api
    restart: unless-stopped
    depends_on:
      - flaresolverr
    ports:
      - "8090:8090"
    environment:
      FLARESOLVERR_URL: ${FLARESOLVERR_URL:-http://flaresolverr:8191}
      TARGET_URL: ${TARGET_URL:-https://grok.com}
      TIMEOUT_SEC: ${TIMEOUT_SEC:-90}
      BASE_PROXY_URL: ${BASE_PROXY_URL:-}
      WARP_AUTO_PRIORITY: ${WARP_AUTO_PRIORITY:-false}
      AUTO_HTTP_PROXY_ENABLED: ${AUTO_HTTP_PROXY_ENABLED:-true}
      AUTO_HTTP_PROXY_PORT: ${AUTO_HTTP_PROXY_PORT:-3128}
      AUTO_HTTP_PROXY_USER: ${AUTO_HTTP_PROXY_USER:-}
      AUTO_HTTP_PROXY_PASSWORD: ${AUTO_HTTP_PROXY_PASSWORD:-}
      PUBLIC_PROXY_URL: ${PUBLIC_PROXY_URL:-}
      API_KEY: ${API_KEY:-}

  # ==================warp===========

  # warp:
  #   container_name: cf-cookie-warp
  #   image: caomingjun/warp:latest
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:1080:1080"
  #   environment:
  #     - WARP_SLEEP=2
  #   cap_add:
  #     - NET_ADMIN

  # ================create_proxy============
  # Authenticated HTTP proxy for callers on another VPS (e.g. n8n).
  # All runtime values are sourced from .env.
  # If PUBLIC_PROXY_URL is empty, API auto-builds url_proxy from egress_ip + AUTO_HTTP_PROXY_*.
  
  http-proxy:
    container_name: cf-cookie-http-proxy
    image: alpine:3.20
    restart: unless-stopped
    ports:
      - "${AUTO_HTTP_PROXY_PORT:-3128}:8888"
    command:
      - /bin/sh
      - -ec
      - |
        apk add --no-cache 3proxy >/dev/null
        cat >/etc/3proxy/3proxy.cfg <<CFG
        daemon
        nscache 65536
        auth strong
        users ${AUTO_HTTP_PROXY_USER:-proxyuser}:CL:${AUTO_HTTP_PROXY_PASSWORD:-change_me}
        allow ${AUTO_HTTP_PROXY_USER:-proxyuser}
        proxy -n -a -p8888
        flush
        CFG
        exec 3proxy /etc/3proxy/3proxy.cfg
